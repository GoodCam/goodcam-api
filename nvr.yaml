        '303':
          $ref: '#/components/responses/Uninitialized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not Found
  '/v1/storage/internal/format/':
    post:
      operationId: 'format-internal-storage'
      tags:
        - storage
      summary: Formatting the internal storage
      security:
        - 'HTTP Digest': []
      description: |
        This endpoint is available only if the `storage`
        [feature](#operation/get-basic-info) is indicated.

        The whole internal storage is viewed as a single space. Disks can be
        arranged in a RAID array. The following RAID levels are supported:

        * **linear** - all disks are concatenated together to form a single
          large storage
        * **RAID 0** - similar to `linear`, but data is striped across all
          disks for better performance
        * **RAID 1** - data is mirrored across all disks for redundancy
        * **RAID 5** - data and parity information is striped across all disks
          for limited redundancy, better performance and more efficient use of
          storage space

        ### Linear arrays

        Linear arrays let you use all the available storage space, but they
        don't provide any redundancy or performance benefits. They are suitable
        for non-critical use cases where maximizing storage capacity is more
        important than reliability or performance. **If one disk in a linear
        array fails, the whole array fails as well and all data in the array
        will be lost.**

        Linear arrays can be also extended by adding more disks to the array.
        However, removing disks without re-formatting is not supported.

        ### RAID 0 arrays

        RAID 0 arrays provide better performance by striping data across all
        disks, but they don't provide any redundancy. They are suitable for
        non-critical use cases where performance is more important than
        reliability. **If one disk in a RAID 0 array fails, the whole array
        fails as well and all data in the array will be lost.**

        We do not support any non-destructive size/layout changes for RAID 0
        arrays. All these changes require re-formatting the array.

        ### RAID 1 arrays

        RAID 1 arrays provide redundancy by mirroring data across all disks.
        They are suitable for NVRs with only two disk slots where redundancy
        is required. **A RAID 1 array can tolerate failure of all but one
        disk.** The total storage capacity of a RAID 1 array is equal to the
        capacity of the smallest disk in the array.

        As long as there is at least one healthy disk in the array, you can
        add/remove disks and change the size of the array without
        re-formatting. However, you can only add disks that have the same or
        larger capacity than the smallest disk currently in the array. You can
        also create a RAID 1 array with only a single disk and add more disks
        to the array later. However, keep in mind that until you increase size
        of the array to at least two disks, there will be no redundancy and the
        array will be vulnerable to disk failures just like a linear or RAID 0
        array.

        ### RAID 5 arrays

        RAID 5 arrays provide limited redundancy by striping data and parity
        information across all disks. They are suitable for NVRs with three or
        more disk slots where redundancy is required. You can also use RAID 5
        on devices with only two disk slots, but there will be no additional
        benefits over RAID 1 in this case. (You cannot create a RAID 5 array
        with less than two disks.) **A RAID 5 array can tolerate failure of one
        disk.** The total storage capacity of a RAID 5 array is equal to the
        capacity of the smallest disk in the array multiplied by the number of
        disks in the array minus one.

        You can add/remove spare disks freely without re-formatting. However,
        when changing the size of the array, you can only increase the number
        of disks in the array. Reducing the number of disks in a RAID 5 array
        requires re-formatting. All disks added to the array must have the same
        or larger capacity than the smallest disk currently in the array.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                level:
                  default: raid-1
                  nullable: true
                  allOf:
                    - $ref: '#/components/schemas/RaidLevel'
                disks:
                  type: array
                  description: |
                    A list of disks that should be included in the array. All
                    available disks will be used if the field is `null`, empty
                    or not provided.
                  nullable: true
                  items:
                    type: integer
                    description: Disk slot identifier
              example:
                level: raid-1
                disks: [0, 1]
      responses:
        '204':
          description: No Content
        '303':
          $ref: '#/components/responses/Uninitialized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  '/v1/storage/internal/expand-fs/':
    post:
      operationId: 'expand-internal-storage-fs'
      tags:
        - storage
      summary: Expanding the internal storage filesystem
      security:
        - 'HTTP Digest': []
      description: |
        This endpoint is available only if the `storage`
        [feature](#operation/get-basic-info) is indicated.

        If the total size of the array increases (e.g. after increasing the
        number of disks in a RAID 5 array), you can use this endpoint to expand
        the filesystem to use the additional space.
      responses:
        '204':
          description: No Content
        '303':
          $ref: '#/components/responses/Uninitialized'
        '401':
          $ref: '#/components/responses/Unauthorized'
  '/v1/storage/internal/add-disk/':
    post:
      operationId: 'add-internal-storage-disk'
      tags:
        - storage
      summary: Adding a disk to the internal storage array
      security:
        - 'HTTP Digest': []
      description: |
        This endpoint is available only if the `storage`
        [feature](#operation/get-basic-info) is indicated.

        This operation can be used to expand a linear array or to add a *spare*
        disk to a RAID 1 or RAID 5 array. RAID 0 arrays are not supported.

        When adding a spare disk to a RAID 1 or RAID 5 array, the disk can be
        used immediately by the array if the array is *degraded* (i.e. there is
        at least one failed/missing disk for the array to be fully
        operational). Otherwise, the disk will be added as a spare and won't be
        used until another disk in the array fails or gets removed. Spare disks
        can be also used when increasing the size of the array (see
        [resizing the internal storage array](#operation/resize-internal-storage-array)
        for more info).

        All new disks added to the array must have the same or larger capacity
        than the smallest disk currently in the array.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                slot:
                  type: integer
                  description: Disk slot identifier
              required:
                - slot
              example:
                slot: 1
      responses:
        '204':
          description: No Content
        '303':
          $ref: '#/components/responses/Uninitialized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  '/v1/storage/internal/remove-disk/':
    post:
      operationId: 'remove-internal-storage-disk'
      tags:
        - storage
      summary: Removing a disk from the internal storage array
      security:
        - 'HTTP Digest': []
      description: |
        This endpoint is available only if the `storage`
        [feature](#operation/get-basic-info) is indicated.

        This operation can be used for removing disks from RAID 1 and RAID 5
        arrays. You can remove any disks (spare, failed or healthy), but keep
        in mind that removing healthy disks may cause the array to become
        degraded and, therefore, more vulnerable to disk failures. It isn't
        allowed to remove the only healthy disk from a RAID 1 array or any
        healthy disk from a RAID 5 array when it's already degraded.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                slot:
                  type: integer
                  description: Disk slot identifier
              required:
                - slot
              example:
                slot: 1
      responses:
        '204':
          description: No Content
        '303':
          $ref: '#/components/responses/Uninitialized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  '/v1/storage/internal/resize-array/':
    post:
      operationId: 'resize-internal-storage-array'
      tags:
        - storage
      summary: Resizing the internal storage array
      security:
        - 'HTTP Digest': []
      description: |
        This endpoint is available only if the `storage`
        [feature](#operation/get-basic-info) is indicated.

        You can use this endpoint to change the number of active disks in a
        RAID 1 or RAID 5 array. However, for RAID 5 arrays, it is only possible
        to increase the number of disks. The disk array must be idle to perform
        any resizing operation.

        When increasing the number of disks in a RAID 1 or RAID 5 array, you
        need to make sure there are enough spare disks available. For example,
        if you want to increase the number of disks in your array by two,
        there must be at least two spare disks available before you can perform
        the operation.

        When reducing the number of disks, you can only reduce them to the
        number of healthy disks currently in the array. For example, if you
        have a RAID 1 array with three healthy disks and you wish to reduce the
        number of disks to two, you need to remove one of the disks first
        (using the [this endpoint](#operation/remove-internal-storage-disk)).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                disks:
                  type: number
                  description: |
                    Number of disks in the RAID array when the array is fully
                    operational
              required:
                - disks
              example:
                size: 2
      responses:
        '204':
          description: No Content
        '303':
          $ref: '#/components/responses/Uninitialized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  '/v1/storage/internal/expand-array/':
    post:
      operationId: 'expand-internal-storage-array'
      tags:
        - storage
      summary: Expanding the internal storage array
      security:
        - 'HTTP Digest': []
      description: |
        This endpoint is available only if the `storage`
        [feature](#operation/get-basic-info) is indicated.

        If the size of the smallest disk in the array increases (e.g. after
        replacing it with a larger one), you can use this endpoint to expand
        the array to use the additional space. Note that this operation does
        not expand the filesystem. You'll need to use the
        [filesystem expansion endpoint](#operation/expand-internal-storage-fs)
        to do that. The disk array must be idle to perform the expansion.
      responses:
        '204':
          description: No Content
        '303':
          $ref: '#/components/responses/Uninitialized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  '/v1/ssh/':
    get:
      operationId: 'get-ssh-settings'
      tags:
        - ssh
      summary: Getting SSH settings
      security:
        - 'HTTP Digest': []
      responses:
        '200':
          $ref: '#/components/responses/SSHSettingsResponse'
        '303':
          $ref: '#/components/responses/Uninitialized'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: 'update-ssh-settings'
      tags:
        - ssh
      summary: Updating SSH settings
      security:
        - 'HTTP Digest': []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SSHSettings'
      responses:
        '200':
          $ref: '#/components/responses/SSHSettingsResponse'
        '303':
          $ref: '#/components/responses/Uninitialized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  '/v1/ssh/users/':
    get:
      operationId: 'get-ssh-users'
      tags:
        - ssh
      summary: Listing SSH users
      security:
        - 'HTTP Digest': []
      responses:
        '200':
          $ref: '#/components/responses/SSHUserListResponse'
        '303':
          $ref: '#/components/responses/Uninitialized'
        '401':
          $ref: '#/components/responses/Unauthorized'
  '/v1/ssh/users/{username}/':
    get:
      operationId: 'get-ssh-user'
      tags:
        - ssh
      summary: Getting SSH user details
      security:
        - 'HTTP Digest': []
      description: |
        The endpoint currently does not provide any additional information. It
        may be extended in the future though.
      parameters:
        - name: username
          in: path
          required: true
          description: Username
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/SSHUserInfoResponse'
        '303':
          $ref: '#/components/responses/Uninitialized'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not Found
    put:
      operationId: 'update-ssh-user'
      tags:
        - ssh
      summary: Changing SSH user settings
      security:
        - 'HTTP Digest': []
      parameters:
        - name: username
          in: path
          required: true
          description: Username
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SSHUserSettings'
      responses:
        '200':
          $ref: '#/components/responses/SSHUserInfoResponse'
        '303':
          $ref: '#/components/responses/Uninitialized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not Found
components:
  schemas:
    PublicInformation:
      type: object
      properties:
        device:
          $ref: '#/components/schemas/PublicDeviceInformation'
        initialized:
          type: boolean
          description: |
            `false` indicates that the [Initial setup](#section/Initial-setup) is required.
          example: true
        apis:
          type: array
          items:
            $ref: '#/components/schemas/PublicApiInformation'
      example:
        device:
          board: acbd18db4cc2f85cedef654fccc4a4d8
        initialized: false
        apis:
          - type: goodcam-nvr
            transport: tcp
            port: 80
            root: '/api/v1/'
            version: 1
    PublicDeviceInformation:
      type: object
      properties:
        board:
          type: string
          description: Hardware family identifier
          example: acbd18db4cc2f85cedef654fccc4a4d8
    BasePublicApiInformation:
      type: object
      properties:
        type:
          type: string
          description: |
            API kind. Possible values are:
            * `goodcam-nvr` - GoodCam API as described in this documentation
          enum:
            - goodcam-nvr
          example: goodcam-nvr
    PublicGoodCamApiInformation:
      allOf:
        - $ref: '#/components/schemas/BasePublicApiInformation'
        - type: object
          properties:
            transport:
              type: string
              description: |
                Transport protocol. Possible values are:
                * `tcp` - TCP protocol
              enum:
                - tcp
              example: tcp
            port:
              type: integer
              description: TCP port
              example: 80
            root:
              type: string
              description: API root
              example: '/api/v1/'
            version:
              type: integer
              description: API major version
              example: 1
    PublicApiInformation:
      oneOf:
        - $ref: '#/components/schemas/PublicGoodCamApiInformation'
      discriminator:
        propertyName: type
        mapping:
          goodcam-nvr: '#/components/schemas/PublicGoodCamApiInformation'
    BasicInformation:
      type: object
      properties:
        api_version:
          type: string
          description: Version of the API
          example: '1.0.0'
        timezone:
          $ref: '#/components/schemas/Timezone'
        firmware:
          $ref: '#/components/schemas/FirmwareInformation'
        features:
          type: object
          properties:
            storage:
              type: boolean
              description: |
                Indicates if the storage support and the
                [corresponding API endpoints](#tag/storage) are available.
              example: true
            recording:
              type: boolean
              description: |
                Indicates if the recording feature and the
                [corresponding API endpoints](#tag/recording) are available.
              example: true
            media_buffer:
              type: boolean
              description: |
                Indicates if the [media buffer feature](#tag/streaming) is
                available. This property also implies `rtsp_20`.
              example: true
            rtsp_20:
              type: boolean
              description: |
                Indicates if the RTSP/2.0 protocol is supported.
              example: true
            fragmented_mp4:
              type: boolean
              description: |
                Indicates if the
                [fragmented MP4 streaming](#operation/get-mp4-stream) is
                available.
              example: true
            webrtc:
              type: boolean
              description: |
                Indicates if the
                [WebRTC streaming](#operation/web-rtc-signaling) is available.
              example: true
            cloud_client:
              type: boolean
              description: |
                Indicates if the [cloud client](#tag/cloud) is available.
              example: true
            gpio:
              type: boolean
              description: |
                Indicates if the [GPIO subsystem](#tag/gpio) is available.
              example: true
    FirmwareInformation:
      type: object
      properties:
        board:
          type: string
          description: Hardware family identifier
          example: acbd18db4cc2f85cedef654fccc4a4d8
        version:
          type: string
          description: Firmware version
          example: '1.0.0'
        build:
          type: string
          description: Firmware build
          example: '2021-07-12T13:44:18+00:00'
    Timezone:
      type: string
      description: Device timezone in [POSIX format](https://www.gnu.org/software/libc/manual/html_node/TZ-Variable.html)
      example: "CET-1CEST,M3.5.0/2,M10.5.0/3"
    ErrorDescription:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/ErrorVariant'
      example:
        error:
          - name: video
            error:
              - name: codec
                error: unsupported codec
    ErrorVariant:
      oneOf:
        - $ref: '#/components/schemas/PlainError'
        - $ref: '#/components/schemas/DetailedError'
    PlainError:
      type: string
      description: Error description
    DetailedError:
      type: array
      items:
        oneOf:
          - $ref: '#/components/schemas/NamedFieldError'
          - $ref: '#/components/schemas/IndexedFieldError'
    NamedFieldError:
      type: object
      properties:
        name:
          type: string
          description: Name of a field causing the error
        error:
          $ref: '#/components/schemas/ErrorVariant'
    IndexedFieldError:
      type: object
      properties:
        index:
          type: integer
          description: Index of a field causing the error
        error:
          $ref: '#/components/schemas/ErrorVariant'
    UserDetails:
      type: object
      properties:
        username:
          type: string
          example: admin
        digest_algorithm:
          type: string
          enum:
            - md5
            - sha256
          example: md5
    NetworkSettings:
      type: object
      properties:
        device_name:
          type: string
          description: Name of the device (used as DNS-SD instance name)
          example: My Camera
    CommonNetworkInterfaceBase:
      type: object
      properties:
        mode:
          type: string
          enum:
            - static
            - dhcp
          description: |
            Interface mode, the possible values are:
            * `static` - for static IP address configuration
            * `dhcp` - for DHCP configuration
          example: static
    CommonNetworkInterfaceSettings:
      allOf:
        - type: object
          properties:
            mac_address:
              type: string
              nullable: true
              description: |
                Interface MAC address as a string containing six hexadecimal
                numbers separated with ":". Use `null` to reset the MAC address
                to the default value.
              example: 00:11:22:33:44:55
        - $ref: '#/components/schemas/CommonNetworkInterfaceBase'
    CommonNetworkInterfaceInfo:
      allOf:
        - type: object
          properties:
            name:
              type: string
              description: Name of the network interface
              example: eth0
            mac_address:
              type: string
              description: |
                Interface MAC address as a string containing six hexadecimal
                numbers separated with ":"
              example: 00:11:22:33:44:55
        - $ref: '#/components/schemas/CommonNetworkInterfaceBase'
    StaticNetworkInterfaceBase:
      type: object
      properties:
        ipv4_address:
          type: string
          description: IPv4 address of the network interface
          example: '192.168.1.100'
        ipv4_mask:
          type: string
          description: IPv4 mask
          example: '255.255.255.0'
        ipv4_gateway:
          type: string
          nullable: true
          description: IPv4 gateway or `null` if the gateway is not set
          example: '192.168.1.1'
        dns_servers:
          type: array
          description: |
            A list of DNS servers. Each DNS server is represented by a string
            containing an IP address.
          example: ['192.168.1.1', '8.8.8.8']
          items:
            type: string
    StaticNetworkInterfaceSettings:
      allOf:
        - $ref: '#/components/schemas/CommonNetworkInterfaceSettings'
        - $ref: '#/components/schemas/StaticNetworkInterfaceBase'
        - type: object
          properties:
            dhcp_server:
              $ref: '#/components/schemas/DHCPServerSettings'
    StaticNetworkInterfaceInfo:
      allOf:
        - $ref: '#/components/schemas/CommonNetworkInterfaceInfo'
        - $ref: '#/components/schemas/StaticNetworkInterfaceBase'
        - type: object
          properties:
            dhcp_server:
              $ref: '#/components/schemas/DHCPServerInfo'
      example:
        name: eth1
        mac_address: '00:11:22:33:44:66'
        mode: static
        ipv4_address: '192.168.2.1'
        ipv4_mask: '255.255.255.0'
        ipv4_gateway: null
        dns_servers: []
        dhcp_server:
          start: '192.168.2.100'
          end: '192.168.2.200'
          static_leases:
            - mac: '00:11:22:33:44:77'
              ip: '192.168.2.150'
          clients:
            - mac: '00:11:22:33:44:77'
              ip: '192.168.2.150'
    DHCPNetworkInterfaceBase:
      type: object
      properties:
        dns_from_dhcp:
          type: boolean
          description: |
            Boolean flag indicating if the device is using DNS servers provided
            by the DHCP server
          example: true
        custom_dns_servers:
          type: array
          items:
            type: string
          description: |
            A list of custom DNS servers. Each DNS server is represented by a
            string containing an IP address.
          example: ['192.168.1.1', '8.8.8.8']
    DHCPNetworkInterfaceSettings:
      allOf:
        - $ref: '#/components/schemas/CommonNetworkInterfaceSettings'
        - $ref: '#/components/schemas/DHCPNetworkInterfaceBase'
    DHCPNetworkInterfaceInfo:
      allOf:
        - $ref: '#/components/schemas/CommonNetworkInterfaceInfo'
        - $ref: '#/components/schemas/DHCPNetworkInterfaceBase'
        - type: object
          properties:
            ipv4_address:
              type: string
              nullable: true
              description: |
                Current IPv4 address of the network interface or `null` if a
                valid IPv4 address hasn't been obtained from the DHCP server
                yet.
              example: '192.168.1.100'
            ipv4_mask:
              type: string
              nullable: true
              description: |
                IPv4 mask or `null` if a valid IPv4 address hasn't been
                obtained from the DHCP server yet.
              example: '255.255.255.0'
      example:
        name: eth0
        mac_address: '00:11:22:33:44:55'
        mode: dhcp
        dns_from_dhcp: true
        custom_dns_servers: []
        ipv4_address: '192.168.1.100'
        ipv4_mask: '255.255.255.0'
    NetworkInterfaceSettings:
      oneOf:
        - $ref: '#/components/schemas/StaticNetworkInterfaceSettings'
        - $ref: '#/components/schemas/DHCPNetworkInterfaceSettings'
      discriminator:
        propertyName: mode
        mapping:
          static: '#/components/schemas/StaticNetworkInterfaceSettings'
          dhcp: '#/components/schemas/DHCPNetworkInterfaceSettings'
    NetworkInterfaceInfo:
      oneOf:
        - $ref: '#/components/schemas/StaticNetworkInterfaceInfo'
        - $ref: '#/components/schemas/DHCPNetworkInterfaceInfo'
      discriminator:
        propertyName: mode
        mapping:
          static: '#/components/schemas/StaticNetworkInterfaceInfo'
          dhcp: '#/components/schemas/DHCPNetworkInterfaceInfo'
    DHCPServerSettings:
      description: DHCP server settings (disabled when `null`)
      type: object
      nullable: true
      properties:
        start:
          type: string
          description: First IPv4 address in the DHCP pool
          example: '192.168.2.100'
        end:
          type: string
          description: Last IPv4 address in the DHCP pool
          example: '192.168.2.200'
        static_leases:
          type: array
          description: |
            A list of static leases. Each lease is represented by a MAC address
            and an IPv4 address that will be assigned to the device with this
            MAC address.
          items:
            $ref: '#/components/schemas/DHCPLease'
    DHCPServerInfo:
      description: |
        DHCP server settings (disabled when `null`, unsupported when not
        present)
      nullable: true
      allOf:
        - $ref: '#/components/schemas/DHCPServerSettings'
        - type: object
          properties:
            clients:
              type: array
              description: |
                A list of DHCP clients currently connected to the network.
                Each client is represented by a MAC address and an IPv4 address
                that is currently assigned to the client.
              items:
                $ref: '#/components/schemas/DHCPLease'
    DHCPLease:
      type: object
      properties:
        mac:
          type: string
          description: |
            Device MAC address represented by a string containing six
            hexadecimal numbers separated with ":"
          example: 00:11:22:33:44:77
        ip:
          type: string
          description: |
            IPv4 address that should be assigned to the device with the given
            MAC address
          example: '192.168.2.150'
    CloudClientSettings:
      type: object
      properties:
        enabled:
          type: boolean
          description: Indicates if the cloud client is enabled or not.
          example: true
        url:
          type: string
          format: url
          description: URL of the cloud service.
          example: https://proxy.goodcam.io:8888/
    CloudClientInfo:
      allOf:
        - $ref: '#/components/schemas/CloudClientSettings'
        - type: object
          properties:
            device_id:
              type: string
              description: Unique identifier of this device.
              example: 6b1f16f1-ccf2-42d3-8087-5024793383d6
            status:
              type: string
              enum:
                - disabled
                - connecting
                - connected
                - disconnected
                - suspended
              example: connected
              description: |
                Current status of the cloud client. Possible values are:
                * `disabled` - The client is disabled.
                * `connecting` - The client is trying to establish a new
                  connection to the cloud service.
                * `connected` - The client is connected to the cloud service
                  and the device is ready for remote access.
                * `disconnected` - The client is disconnected from the cloud
                  service (e.g. due to unavailable network) but the client is
                  still active and it will try to create a new connection as
                  soon as possible.
                * `suspended` - The client is disconnected from the cloud
                  service and its operation has been suspended because the
                  cloud service rejected the connection. This can happen for
                  example if the device has not been paired with any cloud
                  account yet and there is no pairing request for this device
                  either.
    BaseStreamSettings:
      type: object
      properties:
        retention:
          type: integer
          minimum: 0
          default: 0
          description: |
            Number of milliseconds to keep in the media buffer. If set to
            `0`, the media buffer will be disabled for this stream. This
            property is available only if the firmware supports the
            [media buffer feature](#tag/streaming).
          example: 10000
        type:
          type: string
          description: |
            Stream type. Possible values are:
            * `rtsp` - RTSP stream
          enum:
            - rtsp
          example: rtsp
    BaseStreamInfo:
      allOf:
        - type: object
          properties:
            name:
              type: string
              description: Stream identifier
              example: ch-01
            urls:
              type: array
              items:
                type: object
                properties:
                  format:
                    type: string
                    enum:
                      - rtsp
                      - mp4
                    description: |
                      Stream format. Possible values are:
                      * `rtsp` - RTSP stream
                      * `mp4` - fragmented MP4 stream
                    example: rtsp
                  url:
                    type: string
                    format: url
                    description: Stream URL
                    example: 'rtsp://192.168.1.10/ch-01'
        - $ref: '#/components/schemas/BaseStreamSettings'
    BaseStreamSettingsWrite:
      allOf:
        - type: object
          properties:
            rtsp_path:
              type: string
              description: |
                This parameter can be used to configure the RTSP endpoint
                associated with this stream; the string must start with "/"
              example: '/ch-01'
        - $ref: '#/components/schemas/BaseStreamSettings'
    BaseStreamSettingsCreate:
      allOf:
        - type: object
          properties:
            name:
              type: string
              description: Stream identifier
              example: ch-01
        - $ref: '#/components/schemas/BaseStreamSettingsWrite'
    RTSPStreamSettings:
      type: object
      properties:
        source_url:
          type: string
          format: url
          description: RTSP stream URL
        transport_mode:
          type: string
          enum:
            - prefer-tcp
            - prefer-udp
          default: prefer-tcp
          description: |
            RTP transport mode. Possible values are:
            * `prefer-tcp` - RTP over RTSP (i.e. interleaved data) will be
              the first choice
            * `prefer-udp` - RTP over UDP will be the first choice
        keep_alive_mode:
          type: string
          enum:
            - auto
            - always
            - never
          default: auto
          description: |
            RTSP keep-alive mode. Possible values are:
            * `auto` - the device will decide whether to send keep-alive
              requests
            * `always` - keep-alive requests will be sent periodically
            * `never` - keep-alive requests will never be sent
      example:
        source_url: 'rtsp://192.168.1.100/videoMain'
        transport_mode: prefer-tcp
        keep_alive_mode: auto
    RTSPStreamInfo:
      allOf:
        - $ref: '#/components/schemas/BaseStreamInfo'
        - $ref: '#/components/schemas/RTSPStreamSettings'
    RTSPStreamSettingsWrite:
      allOf:
        - $ref: '#/components/schemas/BaseStreamSettingsWrite'
        - $ref: '#/components/schemas/RTSPStreamSettings'
    RTSPStreamSettingsCreate:
      allOf:
        - $ref: '#/components/schemas/BaseStreamSettingsCreate'
        - $ref: '#/components/schemas/RTSPStreamSettings'
      required:
        - name
        - type
        - source_url
    StreamInfo:
      oneOf:
        - $ref: '#/components/schemas/RTSPStreamInfo'
      discriminator:
        propertyName: type
        mapping:
          rtsp: '#/components/schemas/RTSPStreamInfo'
    StreamSettingsWrite:
      oneOf:
        - $ref: '#/components/schemas/RTSPStreamSettingsWrite'
      discriminator:
        propertyName: type
        mapping:
          rtsp: '#/components/schemas/RTSPStreamSettingsWrite'
    StreamSettingsCreate:
      oneOf:
        - $ref: '#/components/schemas/RTSPStreamSettingsCreate'
      discriminator:
        propertyName: type
        mapping:
          rtsp: '#/components/schemas/RTSPStreamSettingsCreate'
    RecordingStorageBase:
      type: object
      properties:
        type:
          type: string
          enum:
            - sd-card
          description: |
            Storage type. Possible values are:

            * `sd-card` - SD card storage
    SDCardRecordingStorage:
      allOf:
        - $ref: '#/components/schemas/RecordingStorageBase'
        - type: object
          properties:
            slot:
              type: integer
              description: SD card identifier
    RecordingStorage:
      oneOf:
        - $ref: '#/components/schemas/SDCardRecordingStorage'
      discriminator:
        propertyName: type
        mapping:
          sd-card: '#/components/schemas/SDCardRecordingStorage'
      description: Recording storage
    RecordingSettings:
      type: object
      properties:
        enabled:
          type: boolean
          description: Set to `false` to stop the recording
        stream:
          type: string
          description: ID of the stream that's supposed to be recorded
        storage:
          $ref: '#/components/schemas/RecordingStorage'
    RecordingInfoBase:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Recording ID
        enabled:
          type: boolean
          description: Set to `false` to stop the recording
        stream:
          type: string
          description: ID of the stream that's supposed to be recorded
        storage:
          $ref: '#/components/schemas/RecordingStorage'
        status:
          type: string
          enum:
            - idle
            - starting
            - running
            - error
          description: |
            Possible recording states:

            * `idle` - the recording is not running
            * `starting` - the recording is starting
            * `running` - the recording is running
            * `error` - the recording is in an error state (the actual error is
                available in the `error` field)
      example:
        id: 426d4f5f-2e3d-4cda-b067-83b613d04c0e
        enabled: true
        stream: primary
        storage:
          type: sd-card
          slot: 0
        status: running
    RecordingInfoIdle:
      allOf:
        - $ref: '#/components/schemas/RecordingInfoBase'
    RecordingInfoStarting:
      allOf:
        - $ref: '#/components/schemas/RecordingInfoBase'
    RecordingInfoRunning:
      allOf:
        - $ref: '#/components/schemas/RecordingInfoBase'
    RecordingInfoError:
      allOf:
        - $ref: '#/components/schemas/RecordingInfoBase'
        - type: object
          properties:
            error:
              type: string
              description: Error description
    RecordingInfo:
      oneOf:
        - $ref: '#/components/schemas/RecordingInfoIdle'
        - $ref: '#/components/schemas/RecordingInfoStarting'
        - $ref: '#/components/schemas/RecordingInfoRunning'
        - $ref: '#/components/schemas/RecordingInfoError'
      discriminator:
        propertyName: status
        mapping:
          idle: '#/components/schemas/RecordingInfoIdle'
          starting: '#/components/schemas/RecordingInfoStarting'
          running: '#/components/schemas/RecordingInfoRunning'
          error: '#/components/schemas/RecordingInfoError'
    BasePinAction:
      type: object
      properties:
        action:
          type: string
          enum:
            - set
            - delay
          description: |
            Pin action type.

            Possible values are:
            * `set` - to set a given pin value
            * `delay` - to wait a given amount of time
          example: set
    SetPinValueAction:
      allOf:
        - $ref: '#/components/schemas/BasePinAction'
        - type: object
          properties:
            value:
              type: boolean
              description: Pin value
              example: true
    DelayPinAction:
      allOf:
        - $ref: '#/components/schemas/BasePinAction'
        - type: object
          properties:
            delay:
              type: number
              minimum: 0
              description:
                Amount of time (in milliseconds) to wait before continuing with
                the next action.
              example: 100
    PinAction:
      oneOf:
        - $ref: '#/components/schemas/SetPinValueAction'
        - $ref: '#/components/schemas/DelayPinAction'
      discriminator:
        propertyName: action
        mapping:
          set: '#/components/schemas/SetPinValueAction'
          delay: '#/components/schemas/DelayPinAction'
    BasePinConfig:
      type: object
      properties:
        type:
          type: string
          enum:
            - fixed
            - custom
          description: |
            Pin configuration variant.

            Possible values are:
            * `fixed` - fixed value
            * `custom` - sequence of custom actions
          example: fixed
    FixedPinConfig:
      allOf:
        - $ref: '#/components/schemas/BasePinConfig'
        - type: object
          properties:
            value:
              type: boolean
              description: Pin value
              example: true
    CustomPinConfig:
      allOf:
        - $ref: '#/components/schemas/BasePinConfig'
        - type: object
          properties:
            actions:
              type: array
              items:
                $ref: '#/components/schemas/PinAction'
              description: Custom actions
              example:
                - action: set
                  value: false
                - action: delay
                  delay: 300
                - action: set
                  value: true
                - action: delay
                  delay: 300
            repeat:
              type: boolean
              description: If true, the actions will be repeated.
              example: true
            timeout:
              type: number
              minimum: 0
              nullable: true
              description: |
                Optional timeout in milliseconds.

                The actions will be stopped after a given amount of time.
              example: 300000
            initial_value:
              type: boolean
              nullable: true
              description: |
                Initial pin value to be set before starting the actions.
              example: null
            final_value:
              type: boolean
              nullable: true
              description: |
                Final value to be set after performing all the actions or after
                the timeout.
              example: false
    PinConfig:
      oneOf:
        - $ref: '#/components/schemas/FixedPinConfig'
        - $ref: '#/components/schemas/CustomPinConfig'
      discriminator:
        propertyName: type
        mapping:
          fixed: '#/components/schemas/FixedPinConfig'
          custom: '#/components/schemas/CustomPinConfig'
      description: Pin configuration
    OutputPinSettings:
      type: object
      properties:
        config:
          $ref: '#/components/schemas/PinConfig'
    BasePinInfo:
      type: object
      properties:
        id:
          type: string
          description: Pin identifier
          example: red-led
        description:
          type: string
          description: Pin description
          example: Red LED
        type:
          type: string
          enum:
            - in
            - out
          description: |
            Pin type.

            Possible values are:
            * `in` - input pin
            * `out` - output pin
          example: out
        value:
          type: boolean
          description: Current pin value
          example: true
    InputPinInfo:
      allOf:
        - $ref: '#/components/schemas/BasePinInfo'
    OutputPinInfo:
      allOf:
        - $ref: '#/components/schemas/BasePinInfo'
        - $ref: '#/components/schemas/OutputPinSettings'
    PinInfo:
      oneOf:
        - $ref: '#/components/schemas/InputPinInfo'
        - $ref: '#/components/schemas/OutputPinInfo'
      discriminator:
        propertyName: type
        mapping:
          in: '#/components/schemas/InputPinInfo'
          out: '#/components/schemas/OutputPinInfo'
      example:
        id: red-led
        description: Red LED
        type: out
        config:
          type: custom
          actions:
            - action: set
              value: false
            - action: delay
              delay: 300
            - action: set
              value: true
            - action: delay
              delay: 300
          repeat: true
          timeout: 300000
          final_value: false
        value: true
    PinInfoList:
      type: array
      items:
        $ref: '#/components/schemas/PinInfo'
    BasePinGroupAction:
      type: object
      properties:
        action:
          type: string
          enum:
            - set
            - delay
          description: |
            Pin action type.

            Possible values are:
            * `set` - to set given pin values
            * `delay` - to wait a given amount of time
          example: set
    SetPinGroupValuesAction:
      allOf:
        - $ref: '#/components/schemas/BasePinGroupAction'
        - type: object
          properties:
            values:
              type: object
              description: |
                Pin values.

                Each property can be a pin identifier and all values must be
                booleans indicating the desired pin values. Only pin
                identifiers belonging to the group are allowed here.
              example:
                red-led: true
                blue-led: false
    DelayPinGroupAction:
      allOf:
        - $ref: '#/components/schemas/BasePinGroupAction'
        - type: object
          properties:
            delay:
              type: number
              minimum: 0
              description:
                Amount of time (in milliseconds) to wait before continuing with
                the next action.
              example: 100
    PinGroupAction:
      oneOf:
        - $ref: '#/components/schemas/SetPinGroupValuesAction'
        - $ref: '#/components/schemas/DelayPinGroupAction'
      discriminator:
        propertyName: action
        mapping:
          set: '#/components/schemas/SetPinGroupValuesAction'
          delay: '#/components/schemas/DelayPinGroupAction'
    BasePinGroupConfig:
      type: object
      properties:
        type:
          type: string
          enum:
            - fixed
            - custom
          description: |
            Pin group configuration variant.

            Possible values are:
            * `fixed` - fixed values
            * `custom` - sequence of custom actions
          example: fixed
    FixedPinGroupConfig:
      allOf:
        - $ref: '#/components/schemas/BasePinGroupConfig'
        - type: object
          properties:
            values:
              type: object
              description: |
                Pin values.

                Each property can be a pin identifier and all values must be
                booleans indicating the desired pin values. Only pin
                identifiers belonging to the group are allowed here.
              example:
                blue-led: false
                red-led: true
    CustomPinGroupConfig:
      allOf:
        - $ref: '#/components/schemas/BasePinGroupConfig'
        - type: object
          properties:
            actions:
              type: array
              items:
                $ref: '#/components/schemas/PinGroupAction'
              description: Custom actions
              example:
                - action: set
                  values:
                    blue-led: true
                    red-led: false
                - action: delay
                  delay: 300
                - action: set
                  values:
                    blue-led: false
                    red-led: true
                - action: delay
                  delay: 300
            repeat:
              type: boolean
              description: If true, the actions will be repeated.
              example: true
            timeout:
              type: number
              minimum: 0
              nullable: true
              description: |
                Optional timeout in milliseconds.

                The actions will be stopped after a given amount of time.
              example: 300000
            initial_values:
              type: object
              nullable: true
              description: |
                Initial pin values to be set before starting the actions.

                Each property can be a pin identifier and all values must be
                booleans indicating the desired pin values. Only pin
                identifiers belonging to the group are allowed here.
              example: null
            final_values:
              type: object
              nullable: true
              description: |
                Final pin values to be set after performing all actions or
                after the timeout.

                Each property can be a pin identifier and all values must be
                booleans indicating the desired pin values. Only pin
                identifiers belonging to the group are allowed here.
              example: null
    PinGroupConfig:
      oneOf:
        - $ref: '#/components/schemas/FixedPinGroupConfig'
        - $ref: '#/components/schemas/CustomPinGroupConfig'
      discriminator:
        propertyName: type
        mapping:
          fixed: '#/components/schemas/FixedPinGroupConfig'
          custom: '#/components/schemas/CustomPinGroupConfig'
      description: Pin group configuration
      example:
        type: custom
        actions:
          - action: set
            values:
              blue-led: true
              red-led: false
          - action: delay
            delay: 300
          - action: set
            values:
              blue-led: false
              red-led: true
          - action: delay
            delay: 300
        repeat: true
        timeout: 300000
        final_values:
          blue-led: false
          red-led: false
    PinGroupSettings:
      type: object
      properties:
        pins:
          type: array
          items:
            type: string
          description: |
            A list of identifiers of output pins belonging to this group
          example:
            - blue-led
            - red-led
        config:
          $ref: '#/components/schemas/PinGroupConfig'
    PinGroupInfo:
      allOf:
        - type: object
          properties:
            id:
              type: string
              description: Pin group identifier
              example: two-leds
        - $ref: '#/components/schemas/PinGroupSettings'
        - type: object
          properties:
            values:
              type: object
              description: |
                Current pin values.

                Each property will be a pin identifier belonging to this group
                and all values will be booleans indicating the current pin
                value.
              example:
                blue-led: false
                red-led: true
    PinGroupInfoList:
      type: array
      items:
        $ref: '#/components/schemas/PinGroupInfo'
    BaseStorageInfo:
      type: object
      properties:
        type:
          type: string
          enum:
            - internal
          description: |
            Storage type.

            Possible values are:
            * `internal` - internal storage
          example: internal
    InternalStorageInfo:
      allOf:
        - $ref: '#/components/schemas/BaseStorageInfo'
        - $ref: '#/components/schemas/InternalStorageDetails'
    StorageInfo:
      oneOf:
        - $ref: '#/components/schemas/InternalStorageInfo'
      discriminator:
        propertyName: type
        mapping:
          internal: '#/components/schemas/InternalStorageInfo'
    ConnectedDiskInfo:
      type: object
      properties:
        status:
          type: string
          enum:
            - unused
            - spare
            - in-sync
            - syncing
            - faulty
          description: |
            Disk status.

            Possible values are:
            * `unused` - the disk is present but it isn't being used by the
              disk array
            * `spare` - the disk is being used as a spare disk by the disk
              array and it may be used as a replacement if another disk fails
            * `in-sync` - the disk is being used by the disk array and it is
              fully synchronized
            * `syncing` - the disk is being used by the disk array and it is
              currently being synchronized
            * `faulty` - the disk has failed and it needs to be replaced
          example: in-sync
        capacity:
          type: integer
          description: Disk capacity in bytes
          example: 1000204886016
        model:
          type: string
          description: Disk model
          example: WDC WD10EARS-00Y
    ConnectedDiskExtendedInfo:
      allOf:
        - $ref: '#/components/schemas/ConnectedDiskInfo'
        - type: object
          properties:
            serial_number:
              type: string
              description: Disk serial number
              nullable: true
              example: WD-WCAV5D915720
            firmware_version:
              type: string
              description: Disk firmware version
              nullable: true
              example: 80.00A80
            smart:
              type: object
              description: S.M.A.R.T. information
              nullable: true
              properties:
                status:
                  type: string
                  enum:
                    - healthy
                    - unhealthy
                  description: |
                    Overall S.M.A.R.T. status.

                    Possible values are:
                    * `healthy` - the disk is healthy
                    * `unhealthy` - the disk is unhealthy and it may fail soon
                      or it has already failed
                  example: healthy
                power_on_time:
                  type: integer
                  description: Power-on time in hours
                  example: 1234
                temperature:
                  type: integer
                  description: Disk temperature in Celsius
                  example: 36
    RaidLevel:
      type: string
      enum:
        - linear
        - raid-0
        - raid-1
        - raid-5
      description: |
        RAID level.

        Possible values are:
        * `linear` - linear (concatenation)
        * `raid-0` - RAID 0 (striping)
        * `raid-1` - RAID 1 (mirroring)
        * `raid-5` - RAID 5 (striping with parity)
      example: raid-1
    RaidInfo:
      type: object
      properties:
        level:
          $ref: '#/components/schemas/RaidLevel'
        disks:
          type: integer
          description: |
            Number of disks in the RAID array when the array is fully
            operational
          example: 2
        degraded:
          type: integer
          description: Number of failed/removed disks in the RAID array
          example: 0
        size:
          type: integer
          description: Total storage capacity of the RAID array in bytes
          example: 1000067825664
        activity:
          type: string
          enum:
            - idle
            - checking
            - syncing
            - recovering
            - reshaping
          description: |
            Current RAID activity.

            Possible values are:
            * `idle` - the RAID array is idle
            * `checking` - the RAID array is being checked for errors
            * `syncing` - the RAID array is being synchronized
            * `recovering` - the RAID array is recovering from a disk failure
            * `reshaping` - the RAID array is being reshaped (e.g. due to a
              change in the RAID configuration)
          example: syncing
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: |
            Activity progress percentage (0-100). The field is present only
            when the `activity` field is not `idle`.
          example: 67
    InternalStorageDetails:
      type: object
      properties:
        status:
          type: string
          enum:
            - offline
            - ok
            - degraded
          description: |
            Internal storage status.

            Possible values are:
            * `offline` - the internal storage is offline (i.e. there are
              either no disks, the disk array has failed or it hasn't been
              initialized yet)
            * `ok` - the internal storage is working properly
            * `degraded` - the disk array is operational but some disks need
              a replacement
          example: ok
        slots:
          type: array
          description: |
            A list of internal storage slots. Each slot can be either empty or
            occupied by a disk.
          items:
            type: object
            properties:
              id:
                type: integer
                description: Slot identifier
                example: 0
              disk:
                description: |
                  Details about the connected disk or `null` if there is no
                  disk in the slot
                nullable: true
                allOf:
                  - $ref: '#/components/schemas/ConnectedDiskInfo'
          example:
            - id: 0
              disk:
                status: in-sync
                capacity: 1000204886016
                model: WDC WD10EARS-00Y
            - id: 1
              disk:
                status: in-sync
                capacity: 1000204886016
                model: WDC WD10EARS-00Y
        raid:
          description: |
            Information about the RAID array or `null` if the storage is
            offline.
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RaidInfo'
        capacity:
          type: integer
          description: Total capacity of the storage filesystem in bytes
          example: 983216185344
        available:
          type: integer
          description: The available capacity in the filesystem (in bytes)
          example: 926970634240
    SSHSettings:
      type: object
      properties:
        enabled:
          type: boolean
          description: Indicates if the SSH service is enabled
          example: false
    SSHUserInfo:
      type: object
      properties:
        username:
          type: string
          description: Username
          example: root
    SSHUserSettings:
      type: object
      properties:
        password:
          type: string
          description: Password
          example: SuperSecretPassword
  responses:
    Uninitialized:
      description: Uninitialized device
    Unauthorized:
      description: Missing or invalid credentials
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDescription'
    BadGateway:
      description: Bad gateway
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDescription'
    PublicInformationResponse:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PublicInformation'
    BasicInformationResponse:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BasicInformation'
    FirmwareInformationResponse:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FirmwareInformation'
    UserListResponse:
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/UserDetails'
    UserCreatedResponse:
      description: Created
      content:
        application/json:
          schema:
